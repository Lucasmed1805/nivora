<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nizora</title>

    <meta name="description" content="Crie seu site em minutos com a Nizora." />
    <meta name="author" content="Nizora" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <meta property="og:title" content="Nizora" />
    <meta property="og:description" content="Crie seu site em minutos." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nizora" />
    <meta name="twitter:description" content="Crie seu site em minutos." />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <div id="root"></div>

    <!-- SCRIPT WHATSAPP -->
    <script>
      function enviarWhatsApp(texto) {
        if (!texto || !texto.trim()) {
          alert("Digite algo antes de continuar");
          return;
        }

        const numero = "5581974008092"; // 🔥 COLOCA SEU NÚMERO AQUI

        const mensagem = `Olá, vim pelo site da Nizora e quero criar um site:\n\n${texto}`;

        const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

        window.open(url, "_blank");
      }

      // 🔥 CAPTURA AUTOMÁTICA DO INPUT E BOTÃO
      document.addEventListener("click", function (e) {
        const botao = e.target.closest("button");

        if (botao && botao.innerText.includes("Criar meu site")) {
          e.preventDefault();

          // tenta pegar qualquer input visível na tela
          const input = document.querySelector("input");

          if (input) {
            enviarWhatsApp(input.value);
          }
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
